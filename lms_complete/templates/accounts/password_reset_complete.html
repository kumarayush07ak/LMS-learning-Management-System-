{% extends 'base.html' %}

{% block title %}Password Reset Complete - EduFlow{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-[#1C1678] to-[#4A3FBC] flex items-center justify-center px-4 py-12">
    <!-- Decorative Background -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-white/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-white/10 rounded-full blur-3xl"></div>
    </div>

    <!-- Main Card -->
    <div class="relative bg-white rounded-3xl shadow-2xl max-w-md w-full p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check-circle text-green-600 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Password Reset Complete!</h1>
            <p class="text-gray-500">Your password has been successfully reset</p>
        </div>

        <!-- Success Message -->
        <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-6">
            <p class="text-green-800 text-center">
                You can now log in with your new password.
            </p>
        </div>

        <!-- Login Button -->
        <a href="{% url 'accounts:login' %}" 
           class="w-full bg-[#1C1678] hover:bg-[#1C1678]/90 text-white font-semibold py-3.5 px-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02] shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
            <i class="fas fa-sign-in-alt"></i>
            Log In Now
        </a>
    </div>
</div>
{% endblock %}
